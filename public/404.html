<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Page Not Found | YHA Computer</title>
  <meta name="robots" content="noindex, follow">
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      background: #fffaf6;
      color: #17130f;
      font-family: Inter, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
      padding: 24px;
    }
    .not-found {
      text-align: center;
      max-width: 480px;
    }
    .not-found-code {
      font-size: clamp(4rem, 10vw, 7rem);
      font-weight: 900;
      color: #ff6b00;
      line-height: 1;
    }
    .not-found h1 {
      margin: 16px 0 12px;
      font-size: 1.6rem;
    }
    .not-found p {
      color: #71675f;
      margin-bottom: 24px;
      line-height: 1.6;
    }
    .not-found a {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      padding: 12px 20px;
      border-radius: 12px;
      background: #ff6b00;
      color: #fff;
      font-weight: 800;
      text-decoration: none;
    }
    .not-found a:hover {
      background: #d94b00;
    }
  </style>
</head>
<body>
  <div class="not-found">
    <div class="not-found-code">404</div>
    <h1>Page not found</h1>
    <p>The page you are looking for does not exist or has been moved. Return to the homepage to explore our IT courses and events.</p>
    <a href="/">Back to homepage</a>
  </div>
</body>
</html>
